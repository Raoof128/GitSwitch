version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - Raoof128
    labels:
      - dependencies
    groups:
      electron:
        patterns:
          - electron
          - electron-*
          - '@electron-toolkit/*'
      testing:
        patterns:
          - vitest
          - '@vitest/*'
          - '@testing-library/*'
          - jsdom
      linting:
        patterns:
          - eslint
          - eslint-*
          - prettier
      build:
        patterns:
          - vite
          - '@vitejs/*'
          - electron-vite
          - terser
          - typescript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
